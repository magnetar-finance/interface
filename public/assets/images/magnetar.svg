<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6A00"></stop>
      <stop offset="100%" stop-color="#FF9F1C"></stop>
    </linearGradient>
  </defs>

  <!-- Primary magnetic field -->
  <circle cx="256" cy="256" r="176" stroke="url(#field)" stroke-width="14" stroke-dasharray="220 96" transform="rotate(-18 256 256)" fill="none"></circle>

  <!-- Secondary warped field -->
  <circle cx="256" cy="256" r="128" stroke="url(#field)" stroke-width="10" stroke-dasharray="124 56" transform="rotate(32 256 256)" fill="none" opacity="0.85"></circle>

  <!-- Magnetar core -->
  <circle cx="256" cy="256" r="16" fill="#FF6A00"></circle>

  <!-- Polar jets -->
  <line x1="256" y1="88" x2="256" y2="168" stroke="#FF6A00" stroke-width="6" stroke-linecap="round"></line>

  <line x1="256" y1="344" x2="256" y2="424" stroke="#FF6A00" stroke-width="6" stroke-linecap="round"></line>

</svg>
